name: deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 15 * * *" # 毎日 0 時

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup nodejs
        uses: actions/setup-node@v3
        with:
          cache: yarn
          node-version: '16.x'
      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: create dotenv
        run: |
          echo 'VITE_STAGE=production' >> .env
          echo 'VITE_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}' >> .env

      - name: build
        run: yarn run build

      - name: deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: koki.me
          force_orphan: true
